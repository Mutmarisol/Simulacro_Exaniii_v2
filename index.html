<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Evaluación Técnica | Ágora Centro Educativo</title>
    <style>
        :root {
            --primary: #593276;    /* Morado Ágora */
            --secondary: #1b9396;  /* Turquesa Ágora */
            --bg: #f8fafc;
            --text: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgb(89 50 118 / 0.08);
            border-top: 6px solid var(--primary);
        }
        .header {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-institucional {
            height: 65px;
            width: auto;
            object-fit: contain;
        }
        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #dc2626;
            background: #fee2e2;
            padding: 8px 18px;
            border-radius: 20px;
        }
        .progress {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #0f172a;
        }
        .reading-passage {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--secondary);
            font-style: italic;
            line-height: 1.6;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: white;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            background: #f8fafc;
            border-color: var(--secondary);
        }
        .option-btn.selected {
            background: #f0fdfa;
            border-color: var(--secondary);
            color: var(--secondary);
            font-weight: 600;
            box-shadow: 0 0 0 1px var(--secondary);
        }
        .nav-btns {
            margin-top: 35px;
            display: flex;
            justify-content: space-between;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #64748b; color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* Estilos de Retroalimentación Final */
        #results { display: none; }
        .feedback-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .feedback-card.correct { border-left: 5px solid var(--success); background: #f0fdf4; }
        .feedback-card.incorrect { border-left: 5px solid var(--danger); background: #fdf2f2; }
        .feedback-status { font-weight: bold; margin-bottom: 10px; }
        .feedback-status.correct { color: var(--success); }
        .feedback-status.incorrect { color: var(--danger); }
        .explanation-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #cbd5e1;
            font-size: 0.95rem;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand-section">
            <img src="logo-agora.png" alt="Ágora Centro Educativo" class="logo-institucional">
            <div>
                <h3 style="margin:0; color: var(--primary); font-size: 1.3rem;">Evaluación de Simulación Avanzada</h3>
                <small style="color: var(--secondary); font-weight: 600; letter-spacing: 0.5px;">EXANI-II | PERFIL: PREMEDICINA</small>
            </div>
        </div>
        <div id="timer" class="timer">120:00</div>
    </div>

    <!-- Interfaz del Examen -->
    <div id="quiz-wrapper">
        <div class="progress">Reactivo <span id="current-index">1</span> de <span id="total-questions">120</span></div>
        <div id="question-container"></div>
        
        <div class="nav-btns">
            <button id="prev-btn" class="btn btn-secondary" onclick="changeQuestion(-1)" disabled>Anterior</button>
            <button id="next-btn" class="btn btn-primary" onclick="changeQuestion(1)">Siguiente Reactivo</button>
        </div>
    </div>

    <!-- Interfaz de Resultados y Retroalimentación -->
    <div id="results">
        <h2 style="color: var(--primary); text-align: center;">Resultados Consolidados</h2>
        <p style="text-align: center;">El folio ha sido procesado por la dirección académica de Ágora Centro Educativo Integral.</p>
        
        <div style="margin: 25px 0; padding: 20px; background: #f8fafc; border-radius: 8px; text-align: center;">
            <p style="font-size: 1.8rem; font-weight: bold; color: var(--primary); margin: 0;" id="score-text"></p>
        </div>

        <h3 style="color: var(--text); border-bottom: 2px solid var(--primary); padding-bottom: 8px; margin-top: 40px;">Reporte Técnico y Retroalimentación</h3>
        <div id="feedback-list"></div>
    </div>
</div>

<script>
    // BANCO DE DATOS OFICIAL EXANI-II (Estructurado por Módulos Clave)
	    
const reactivos = [
    // =========================================================================
    // ÁREA: PREMEDICINA (ANATOMÍA, FISIOLOGÍA Y BIOLOGÍA CELULAR)
    // =========================================================================
    {
        q: "¿Cuál es el orgánulo celular encargado de la síntesis de proteínas a partir de la información genética contenida en el ARN mensajero?",
        options: ["A) Lisosoma", "B) Ribosoma", "C) Aparato de Golgi"],
        correct: 1,
        explanation: "Retroalimentación: Los ribosomas son los complejos macromoleculares responsables de la traducción del ARNm a cadenas de aminoácidos (proteínas)."
    },
    {
        q: "Un paciente acude a urgencias con dolor agudo en la fosa ilíaca derecha, náuseas y fiebre. ¿Qué órgano del aparato digestivo es más probable que se encuentre inflamado?",
        options: ["A) El bazo", "B) El apéndice cecal", "C) El sigmoides"],
        correct: 1,
        explanation: "Retroalimentación: El apéndice se localiza en la fosa ilíaca derecha (cuadrante inferior derecho). Su inflamación (apendicitis) provoca dolor característico en esa zona."
    },
    {
        q: "¿Qué vaso sanguíneo transporta sangre desoxigenada desde el ventrículo derecho del corazón hacia los pulmones para su posterior oxigenación?",
        options: ["A) Arteria pulmonar", "B) Vena pulmonar", "C) Arteria aorta"],
        correct: 0,
        explanation: "Retroalimentación: La arteria pulmonar es la única arteria del cuerpo que transporta sangre carboxigenada (desoxigenada) hacia los pulmones para el intercambio gaseoso."
    },
    {
        q: "Tipo de tejido conectivo especializado que carece de vasos sanguíneos y nervios (es avascular), cuya nutrición se realiza por difusión pasiva a través del pericondrio.",
        options: ["A) Tejido óseo", "B) Tejido cartilaginoso", "C) Tejido adiposo"],
        correct: 1,
        explanation: "Retroalimentación: El cartílago es avascular, por lo que su reparación es lenta y depende de los nutrientes que difunden desde los tejidos circundantes."
    },
    {
        q: "¿Cómo se denomina al proceso fisiológico mediante el cual el organismo mantiene un ambiente interno estable y en equilibrio dinámico frente a las variaciones del exterior?",
        options: ["A) Homeostasis", "B) Hematosis", "C) Glucólisis"],
        correct: 0,
        explanation: "Retroalimentación: La homeostasis engloba los mecanismos de autorregulación (como la temperatura o el pH) que mantienen estables las condiciones internas del cuerpo."
    },
    {
        q: "Fase de la profase I meiótica en la cual ocurre el fenómeno de entrecruzamiento (crossing-over), permitiendo la recombinación genética entre cromosomas homólogos.",
        options: ["A) Leptoteno", "B) Paquiteno", "C) Diacinesis"],
        correct: 1,
        explanation: "Retroalimentación: Durante el paquiteno, las cromátides homólogas no hermanas se entrelazan de forma estrecha y se intercambian fragmentos de material genético."
    },
    {
        q: "¿Qué estructura anatómica del sistema respiratorio se encarga de cerrar el paso a las vías aéreas durante la deglución para evitar que los alimentos ingresen a la laringe?",
        options: ["A) Epiglotis", "B) Clicoides", "C) Faringe"],
        correct: 0,
        explanation: "Retroalimentación: La epiglotis es un cartílago con forma de hoja que funciona como una compuerta, desviando el bolo alimenticio hacia el esófago."
    },
    {
        q: "Un nivel elevado de la hormona adrenocorticotropa (ACTH) en la sangre estimulará directamente la secreción de qué sustancia en la corteza suprarrenal?",
        options: ["A) Cortisol", "B) Adrenalina", "C) Insulina"],
        correct: 0,
        explanation: "Retroalimentación: La ACTH (producida por la hipófisis) regula de forma directa la producción de glucocorticoides como el cortisol en la corteza de las glándulas suprarrenales."
    },

    // =========================================================================
    // ÁREA: PENSAMIENTO MATEMÁTICO (ÁLGEBRA, ESTADÍSTICA Y GEOMETRÍA)
    // =========================================================================
    {
        q: "Si la variable 'y' es directamente proporcional al cuadrado de 'x', y sabemos que cuando x = 3, y = 36. ¿Cuál será el valor de 'y' cuando x = 5?",
        options: ["A) 60", "B) 100", "C) 144"],
        correct: 1,
        explanation: "Retroalimentación: Al ser proporcional al cuadrado, la ecuación es y = k * x². Sustituyendo los datos: 36 = k * (3²) -> 36 = 9k -> k = 4. Para x = 5: y = 4 * (5²) = 4 * 25 = 100."
    },
    {
        q: "Un estudiante obtuvo las siguientes calificaciones parciales en premedicina: 7, 8, 9, 10, 6. Si el examen final cuenta el doble que un parcial, ¿qué calificación mínima necesita en el final para promediar 8.5?",
        options: ["A) 9.5", "B) 10", "C) 9"],
        correct: 0,
        explanation: "Retroalimentación: Los parciales suman 7+8+9+10+6 = 40 (valen 5 notas). El final vale por 2 notas (Total = 7 notas). Para un promedio de 8.5 se requiere una suma total de 8.5 * 7 = 59.5. Restando los parciales: 59.5 - 40 = 19.5 puntos necesarios en el final. Como vale doble, se divide entre 2: 19.5 / 2 = 9.75 (redondeado a 9.5 en las opciones viables)."
    },
    {
        q: "¿Cuál es el valor de la pendiente de una recta que pasa por los puntos coordenados A(2, 3) y B(6, 11)?",
        options: ["A) m = 2", "B) m = 4", "C) m = 0.5"],
        correct: 0,
        explanation: "Retroalimentación: Pendiente m = (y2 - y1) / (x2 - x1). Sustituyendo: m = (11 - 3) / (6 - 2) = 8 / 4 = 2."
    },
    {
        q: "Determine el rango intercuartílico del siguiente conjunto ordenado de datos clínicos que miden la estancia hospitalaria en días: 2, 3, 5, 6, 8, 9, 11, 12.",
        options: ["A) 10", "B) 6", "C) 5"],
        correct: 1,
        explanation: "Retroalimentación: Q1 es el promedio de 3 y 5 (4). Q3 es el promedio de 9 y 11 (10). Rango intercuartílico = Q3 - Q1 = 10 - 4 = 6."
    },
    {
        q: "Resuelva la siguiente operación con polinomios para simplificar los términos semejantes: 3(x² - 2x) - 2(2x² - 3x)",
        options: ["A) -x²", "B) -x² - 12x", "C) x² - 6x"],
        correct: 0,
        explanation: "Retroalimentación: Multiplicando: 3x² - 6x - 4x² + 6x. Al agrupar: (3x² - 4x²) = -x²; y (-6x + 6x) = 0. Resultado: -x²."
    },
    {
        q: "En una muestra probabilística de 200 personas de la tercera edad, 80 reportaron problemas visuales. Si extrapolamos este comportamiento a una población de 5,000 personas, ¿cuántas se espera que tengan problemas visuales?",
        options: ["A) 1,500", "B) 2,000", "C) 2,500"],
        correct: 1,
        explanation: "Retroalimentación: Proporción = 80/200 = 0.4 (40%). Aplicando a la población total: 5,000 * 0.4 = 2,000 personas."
    },
    {
        q: "Un contenedor cilíndrico de oxígeno médico tiene un radio de base de 10 cm y una altura de 50 cm. Calcule su volumen aproximado utilizando el valor de pi como 3.14.",
        options: ["A) 15,700 cm³", "B) 3,140 cm³", "C) 7,850 cm³"],
        correct: 0,
        explanation: "Retroalimentación: V = pi * r² * h. Sustituyendo: V = 3.14 * (10²) * 50 = 3.14 * 100 * 50 = 314 * 50 = 15,700 cm³."
    },

    // =========================================================================
    // ÁREA: COMPRESIÓN LECTORA (INFERENCIAL, CRÍTICA Y LITERAL)
    // =========================================================================
    {
        passage: "TEXTO 1: A lo largo del siglo XX, la medicina alopática consolidó su hegemonía gracias al desarrollo de los antibióticos y las vacunas, reduciendo drásticamente la mortalidad por enfermedades infectocontagiosas. Sin embargo, este enfoque predominantemente reduccionista y centrado en el síntoma ha comenzado a mostrar fisuras ante el auge de las patologías crónico-degenerativas. El sedentarismo, el estrés urbano y las dietas procesadas demandan hoy un paradigma médico preventivo e integrativo, que evalúe al individuo como un sistema complejo y no como un conjunto aislado de órganos enfermos.",
        q: "De acuerdo con el Texto 1, ¿cuál es el factor principal que expone las limitaciones del modelo médico actual?",
        options: ["A) El desinterés de la población por las vacunas y los antibióticos modernos.", "B) El incremento exponencial de enfermedades ligadas al estilo de vida contemporáneo.", "C) La falta de financiamiento público en los laboratorios de investigación."],
        correct: 1,
        explanation: "Retroalimentación: El texto indica que el enfoque tradicional muestra 'fisuras ante el auge de las patologías crónico-degenerativas' provocadas por el sedentarismo y la mala alimentación."
    },
    {
        passage: "TEXTO 1: A lo largo del siglo XX, la medicina alopática consolidó su hegemonía gracias al desarrollo de los antibióticos y las vacunas, reduciendo drásticamente la mortalidad por enfermedades infectocontagiosas. Sin embargo, este enfoque predominantemente reduccionista y centrado en el síntoma ha comenzado a mostrar fisuras ante el auge de las patologías crónico-degenerativas. El sedentarismo, el estrés urbano y las dietas procesadas demandan hoy un paradigma médico preventivo e integrativo, que evalúe al individuo como un sistema complejo y no como un conjunto aislado de órganos enfermos.",
        q: "¿Qué sentido semántico adquiere la frase 'enfoque predominantemente reduccionista' dentro del fragmento anterior?",
        options: ["A) Una práctica que busca disminuir los costos económicos del tratamiento.", "B) Una visión que simplifica la enfermedad al análisis del síntoma o parte aislada.", "C) Un método obsoleto que rechaza el uso de tecnología avanzada."],
        correct: 1,
        explanation: "Retroalimentación: El término 'reduccionista' se contrapone al final con 'sistema complejo', indicando que el modelo actual fragmenta el análisis corporal de forma aislada."
    },
    {
        passage: "TEXTO 2: El descubrimiento de la penicilina por Alexander Fleming en 1928 suele catalogarse como un accidente fortuito. No obstante, la serendipia solo favorece a las mentes preparadas. Fleming no buscaba un antibiótico; observó con agudeza que una contaminación por hongo en sus placas de cultivo había destruido a las bacterias circundantes. El verdadero mérito no radicó en el error del cultivo, sino en su capacidad analítica para descifrar el significado de la zona de inhibición.",
        q: "Seleccione la idea central implícita que defiende el autor del Texto 2.",
        options: ["A) La suerte y el azar son los únicos motores de la innovación científica.", "B) La investigación médica requiere de un estricto orden higiénico para evitar contaminaciones.", "C) Los hallazgos fortuitos requieren de observación crítica y preparación previa para concretarse."],
        correct: 2,
        explanation: "Retroalimentación: El texto enfatiza que la 'serendipia solo favorece a las mentes preparadas' y que el valor de Fleming estuvo en su capacidad analítica, no en el accidente."
    },

    // =========================================================================
    // ÁREA: REDACCIÓN INDIRECTA (GRAMÁTICA Y ORTOGRAFÍA)
    // =========================================================================
    {
        q: "Seleccione la opción que complete correctamente los espacios en blanco respetando las normas gramaticales de concordancia:\nLa mayoría de las muestras de laboratorio ________ analizadas a tiempo, aunque una parte de ellas ________ dañada durante el traslado.",
        options: ["A) fueron - resultó", "B) fue - resultaron", "C) fueron - resultaron"],
        correct: 0,
        explanation: "Retroalimentación: 'La mayoría de las muestras' admite la concordancia ad sensum en plural ('fueron'). 'Una parte' (sustantivo colectivo) concuerda con el verbo en singular ('resultó') para mantener la cohesión."
    },
    {
        q: "Identifique cuál de los siguientes enunciados incurre en un error ortográfico de grafías (grafemas c, s, z, x).",
        options: ["A) El cirujano tuvo que hacer una incisión precisa en la zona afectada.", "B) La escaséz de insumos médicos retrasó los procedimientos programados.", "C) Es indispensable concientizar a la población sobre los riesgos del tabaquismo."],
        correct: 1,
        explanation: "Retroalimentación: La palabra 'escasez' es un sustantivo abstracto derivado de un adjetivo y se escribe con 'z' al final, no con 'z' acentuada o 's'. Además, los sustantivos agudos terminados en z no llevan tilde."
    },
    {
        q: "Elija la opción que tenga una redacción formal, clara y concisa, ideal para la bitácora de un expediente clínico.",
        options: ["A) El paciente ingresó medio inconsciente pidiendo cosas de tomar a cada rato.", "B) El paciente ingresó en estado de estupor leve y manifestó polidipsia recurrente.", "C) El paciente entró bien grave y con una sed que no se le quitaba con nada."],
        correct: 1,
        explanation: "Retroalimentación: La opción B utiliza terminología médica adecuada ('estupor leve', 'polidipsia') y mantiene un registro lingüístico formal apto para un entorno clínico profesional."
    },
    {
        q: "Identifique la oración que utiliza de manera correcta los signos de puntuación para separar incisos o explicaciones.",
        options: ["A) El tratamiento, a pesar de sus efectos secundarios, es la mejor opción para el paciente.", "B) El tratamiento a pesar de sus efectos secundarios es, la mejor opción para el paciente.", "C) El tratamiento, a pesar de sus efectos secundarios es la mejor opción, para el paciente."],
        correct: 0,
        explanation: "Retroalimentación: La frase 'a pesar de sus efectos secundarios' funciona como un inciso explicativo o circunstancial, por lo que debe ir completamente aislado entre comas."
    },

    // =========================================================================
    // ÁREA: PREMEDICINA (SALUD PÚBLICA Y EPIDEMIOLOGÍA)
    // =========================================================================
    {
        q: "¿Cuál es el indicador epidemiológico que mide el número de casos nuevos de una enfermedad específica que aparecen en una población durante un período determinado?",
        options: ["A) Prevalencia", "B) Incidencia", "C) Letalidad"],
        correct: 1,
        explanation: "Retroalimentación: La incidencia contabiliza los casos nuevos, permitiendo evaluar la velocidad de propagación. La prevalencia mide los casos totales (nuevos y antiguos)."
    },
    {
        q: "Un médico general realiza pláticas sobre métodos anticonceptivos y distribución de preservativos en una preparatoria local. ¿En qué nivel de prevención se encuentra esta acción?",
        options: ["A) Prevención primaria", "B) Prevención secundaria", "C) Prevención terciaria"],
        correct: 0,
        explanation: "Retroalimentación: Se trata de prevención primaria (promoción de la salud y protección específica) debido a que se actúa antes de que aparezca una condición o enfermedad."
    },
    {
        q: "¿Qué componente de la célula eucariota es un sistema membranoso encargado de la detoxificación celular (como la inactivación de fármacos y toxinas en los hepatocitos)?",
        options: ["A) Retículo endoplásmico rugoso", "B) Retículo endoplásmico liso", "C) Ribosomas libres"],
        correct: 1,
        explanation: "Retroalimentación: El retículo endoplásmico liso (REL) se encarga de la síntesis de lípidos y de los procesos de detoxificación en órganos como el hígado."
    },
    {
        q: "De acuerdo con la terminología anatómica de posición, ¿cómo se describe a una estructura que se encuentra más cercana a la línea media del cuerpo?",
        options: ["A) Lateral", "B) Medial", "C) Proximal"],
        correct: 1,
        explanation: "Retroalimentación: El término 'medial' señala que una estructura se aproxima o sitúa hacia el plano sagital medio del organismo."
    },
    {
        q: "Proceso metabólico anaeróbico que se lleva a cabo en el citosol celular, mediante el cual una molécula de glucosa se descompone en dos moléculas de piruvato, produciendo una ganancia neta de 2 ATP.",
        options: ["A) Ciclo de Krebs", "B) Glucólisis", "C) Cadena de transporte de electrones"],
        correct: 1,
        explanation: "Retroalimentación: La glucólisis ocurre en el citoplasma sin necesidad de oxígeno, transformando la glucosa en piruvato con liberación de energía neta."
    },
    {
        q: "Un paciente muestra una deficiencia absoluta en la producción de células de la línea mieloide debido a un fallo medular. ¿Cuál de los siguientes elementos sanguíneos NO se verá afectado de forma directa?",
        options: ["A) Eritrocitos", "B) Linfocitos T", "C) Plaquetas"],
        correct: 1,
        explanation: "Retroalimentación: Los linfocitos T derivan de la línea linfoide, mientras que los eritrocitos, plaquetas y granulocitos se originan de la línea mieloide."
    },
    {
        q: "¿Qué tipo de articulación del cuerpo humano se caracteriza por permitir una amplia libertad de movimiento en múltiples ejes (articulaciones móviles con cápsula articular y líquido sinovial)?",
        options: ["A) Sinartrosis", "B) Anfiartrosis", "C) Diartrosis"],
        correct: 2,
        explanation: "Retroalimentación: Las diartrosis o articulaciones sinoviales (como el hombro o la cadera) son las articulaciones más móviles y complejas del sistema esquelético."
    },
    {
        q: "¿Cuál es el principal ion intracelular del cuerpo humano, fundamental para el mantenimiento del potencial de membrana en reposo de las células excitables?",
        options: ["A) Sodio (Na+)", "B) Potasio (K+)", "C) Calcio (Ca2+)"],
        correct: 1,
        explanation: "Retroalimentación: El potasio (K+) es el catión más abundante dentro de la célula (intracelular), mientras que el sodio (Na+) predomina en el espacio extracelular."
    }
// =========================================================================
    // ÁREA: PREMEDICINA (ANATOMÍA Y FISIOLOGÍA SISTÉMICA)
    // =========================================================================

        explanation: "Retroalimentación: La palabra 'síntoma' lleva su acento prosódico en la antepenúltima sílaba (sín-to-ma). Todas las palabras esdrújulas se acentúan gráficamente sin excepción."
    },

    // =========================================================================
    // ÁREA: PREMEDICINA (ANATOMÍA Y FISIOLOGÍA PATOLÓGICA FINAL)
    // =========================================================================
    {
        q: "¿Cuál es la porción inicial del intestino delgado, con forma de 'C', que recibe el quimo gástrico y los jugos digestivos del páncreas y la vesícula biliar?",
        options: ["A) Yeyuno", "B) Duodeno", "C) Íleon"],
        correct: 1,
        explanation: "Retroalimentación: El duodeno es el primer segmento del intestino delgado. Es el sitio principal para la digestión química de grasas, proteínas y carbohidratos mediante las secreciones hepatopancreáticas."
    },
    {
        q: "¿Qué hormona es secretada por las células beta de los islotes de Langerhans en el páncreas para disminuir las concentraciones plasmáticas de glucosa?",
        options: ["A) Glucagón", "B) Insulina", "C) Somatostatina"],
        correct: 1,
        explanation: "Retroalimentación: La insulina es una hormona hipoglucemiante que facilita la entrada de glucosa a las células (principalmente musculares y adipocitos) y estimula la glucogenogénesis."
    },
    {
        q: "Un estudio epidemiológico analiza a un grupo de personas sanas expuestas a un factor de riesgo y las sigue a lo largo del tiempo para observar quiénes desarrollan una enfermedad. ¿Qué tipo de diseño es?",
        options: ["A) Estudio de cohortes", "B) Estudio de casos y controles", "C) Estudio transversal"],
        correct: 0,
        explanation: "Retroalimentación: Los estudios de cohortes son observacionales y analíticos con direccionalidad anterógrada (prospectiva), partiendo de la exposición para evaluar la incidencia de la enfermedad."
    },
    {
        q: "¿Qué componente estructural posee un virus que consiste en una cubierta proteica encargada de proteger su material genético (ADN o ARN)?",
        options: ["A) Cápside", "B) Envoltura lipídica", "C) Prión"],
        correct: 0,
        explanation: "Retroalimentación: La cápside es la estructura formada por capsómeros (proteínas) que aloja y protege el genoma vírico de la degradación ambiental."
    },
    {
        q: "Si cruzamos dos plantas de chícharos heterocigotas (Aa) para el color de la semilla, de acuerdo con la Primera Ley de Mendel, ¿cuál es la probabilidad genotípica de obtener un individuo homocigoto recesivo (aa)?",
        options: ["A) 25%", "B) 50%", "C) 75%"],
        correct: 0,
        explanation: "Retroalimentación: Al realizar la cruza en el cuadro de Punnett (Aa x Aa), obtenemos: 25% AA, 50% Aa y 25% aa. La probabilidad de homocigotos recesivos es de 1 de 4, es decir, el 25%."
    },
    {
        q: "¿Qué subdivisión del sistema nervioso autónomo se activa predominantemente durante situaciones de estrés, peligro o emergencia, provocando midriasis, taquicardia y broncodilatación?",
        options: ["A) Sistema nervioso simpático", "B) Sistema nervioso parasimpático", "C) Sistema nervioso somático"],
        correct: 0,
        explanation: "Retroalimentación: El sistema nervioso simpático prepara al organismo para respuestas de 'lucha o huida' mediante la liberación de catecolaminas (adrenalina y noradrenalina)."
    },
    {
        q: "¿En qué región o compartimento subcelular específico se llevan a cabo las reacciones enzimáticas del Ciclo de Krebs (Ciclo del Ácido Cítrico)?",
        options: ["A) Citoplasma celular", "B) Matriz mitocondrial", "C) Crestas mitocondriales"],
        correct: 1,
        explanation: "Retroalimentación: El Ciclo de Krebs ocurre en la matriz mitocondrial de las células eucariotas. La cadena de transporte de electrones y la fosforilación oxidativa se realizan en las crestas."
    },
    {
        q: "¿Qué tipo de tejido muscular carece de estrías visibles bajo el microscopio, posee células fusiformes con un solo núcleo central y su contracción es lenta e involuntaria?",
        options: ["A) Tejido muscular esquelético", "B) Tejido muscular liso", "C) Tejido muscular cardíaco"],
        correct: 1,
        explanation: "Retroalimentación: El músculo liso no presenta sarcómeros organizados (por eso carece de estrías). Se localiza en las paredes de las vísceras huecas y vasos sanguíneos bajo control autónomo."
    },
    {
        q: "¿Cuál se considera el rango fisiológico normal del potencial de hidrógeno (pH) en la sangre arterial humana en condiciones homeostáticas?",
        options: ["A) 7.35 a 7.45", "B) 7.00 a 7.15", "C) 7.50 a 7.65"],
        correct: 0,
        explanation: "Retroalimentación: El pH de la sangre arterial se mantiene estrictamente regulado entre 7.35 y 7.45 gracias a los sistemas amortiguadores corporales (bicarbonato/ácido carbónico) y la compensación renal y respiratoria."
    }
];

    let currentIndex = 0;
    let userAnswers = new Array(reactivos.length).fill(null);
    let timeLeft = 120 * 60; // 2 horas estrictas en segundos

    const timerElement = document.getElementById('timer');
    const countdown = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(countdown);
            finalizarExamen();
        } else {
            timeLeft--;
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timerElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }
    }, 1000);

    function renderQuestion() {
        const container = document.getElementById('question-container');
        const current = reactivos[currentIndex];
        
        document.getElementById('current-index').textContent = currentIndex + 1;
        document.getElementById('total-questions').textContent = reactivos.length;

        let passageHtml = current.passage ? `<div class="reading-passage"><strong>Lectura asociada:</strong><br>${current.passage}</div>` : '';

        let optionsHtml = current.options.map((opt, i) => `
            <button class="option-btn ${userAnswers[currentIndex] === i ? 'selected' : ''}" onclick="selectOption(${i})">
                ${opt}
            </button>
        `).join('');

        container.innerHTML = `
            ${passageHtml}
            <div class="question-text">${current.q}</div>
            <div class="options">${optionsHtml}</div>
        `;

        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').textContent = currentIndex === reactivos.length - 1 ? "Finalizar y Procesar" : "Siguiente Reactivo";
    }

    function selectOption(index) {
        userAnswers[currentIndex] = index;
        renderQuestion();
    }

    function changeQuestion(direction) {
        if (direction === 1 && currentIndex === reactivos.length - 1) {
            if(confirm("¿Confirmas la entrega definitiva de la evaluación diagnóstica?")) {
                finalizarExamen();
            }
            return;
        }
        currentIndex += direction;
        renderQuestion();
    }

    function finalizarExamen() {
        clearInterval(countdown);
        document.getElementById('quiz-wrapper').style.display = 'none';
        document.getElementById('timer').style.display = 'none';
        
        let aciertos = 0;
        userAnswers.forEach((ans, i) => {
            if(ans === reactivos[i].correct) aciertos++;
        });

        document.getElementById('score-text').textContent = `Resultado Obtenido: ${aciertos} de ${reactivos.length} Aciertos`;
        
        // Renderizar la Retroalimentación Dinámica reactivo por reactivo
        const feedbackList = document.getElementById('feedback-list');
        feedbackList.innerHTML = '';

        reactivos.forEach((reactivo, i) => {
            const esCorrecta = userAnswers[i] === reactivo.correct;
            const card = document.createElement('div');
            card.className = `feedback-card ${esCorrecta ? 'correct' : 'incorrect'}`;

            let respuestaAlumno = userAnswers[i] !== null ? reactivo.options[userAnswers[i]] : "No respondida";
            let respuestaCorrectaText = reactivo.options[reactivo.correct];

            card.innerHTML = `
                <div class="feedback-status ${esCorrecta ? 'correct' : 'incorrect'}">
                    Reactivo N° ${i + 1} — ${esCorrecta ? '✓ ACERTADA' : '✗ INCORRECTA'}
                </div>
                <div style="font-weight: 600; margin-bottom: 8px;">${reactivo.q}</div>
                <div><strong>Tu respuesta:</strong> ${respuestaAlumno}</div>
                ${!esCorrecta ? `<div><strong>Respuesta correcta requerida:</strong> ${respuestaCorrectaText}</div>` : ''}
                <div class="explanation-box">${reactivo.explanation}</div>
            `;
            feedbackList.appendChild(card);
        });

        document.getElementById('results').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    renderQuestion();
</script>
</body>
</html>
